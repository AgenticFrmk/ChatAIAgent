services:

  # ── Auth Service DB ──────────────────────────────────────────────────────────
  postgres-auth:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: auth_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:-postgres}
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_service"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - agentic

  # ── Auth Service ─────────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ../AuthService
    depends_on:
      postgres-auth:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${AUTH_DB_PASSWORD:-postgres}@postgres-auth:5432/auth_service
      RSA_KEY_ID: ${RSA_KEY_ID:-key-2024-01}
      RSA_KEY_DIR: /keys
      TOKEN_EXPIRE_MINUTES: ${TOKEN_EXPIRE_MINUTES:-60}
    volumes:
      - rsa_keys:/keys
    networks:
      - agentic

  # ── Registry Service DB ───────────────────────────────────────────────────────
  postgres-registry:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: registry_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${REGISTRY_DB_PASSWORD:-postgres}
    volumes:
      - postgres_registry_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d registry_service"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - agentic

  # ── Registry Service ──────────────────────────────────────────────────────────
  registry-service:
    build:
      context: ../RegistryService
    depends_on:
      postgres-registry:
        condition: service_healthy
      auth-service:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${REGISTRY_DB_PASSWORD:-postgres}@postgres-registry:5432/registry_service
      JWKS_URL: http://auth-service:9000/.well-known/jwks.json
      AUTH_SERVICE_TOKEN_URL: http://auth-service:9000/auth/token
      REGISTRY_SERVICE_URL: http://registry-service:8001
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s
    networks:
      - agentic

  # ── Gateway DB (sessions) ────────────────────────────────────────────────────
  postgres-gateway:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agent_gateway
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${GATEWAY_DB_PASSWORD:-postgres}
    volumes:
      - postgres_gateway_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agent_gateway"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - agentic

  # ── AgentCore DB (LangGraph checkpoints, plan history) ───────────────────────
  postgres-agentcore:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agentcore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${AGENTCORE_DB_PASSWORD:-postgres}
    volumes:
      - postgres_agentcore_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agentcore"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - agentic

  # ── SLMPlatform DB (agent run metrics) ───────────────────────────────────────
  postgres-slm:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: slm_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${SLM_DB_PASSWORD:-postgres}
    volumes:
      - postgres_slm_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d slm_platform"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - agentic

  # ── SLMPlatform (agent perf metrics API) ─────────────────────────────────────
  slm-platform:
    build:
      context: ../SLMPlatform
    depends_on:
      postgres-slm:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${SLM_DB_PASSWORD:-postgres}@postgres-slm:5432/slm_platform
      SLMPLATFORM_API_TOKEN: ${SLMPLATFORM_API_TOKEN:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - agentic

  # ── Redis (streaming event bus) ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - agentic

  # ── AgentBE (AgentCore + LangGraph runtime) ───────────────────────────────────
  agentbe:
    build:
      context: ../
      dockerfile: AgentBE/Dockerfile
    depends_on:
      postgres-agentcore:
        condition: service_healthy
      registry-service:
        condition: service_healthy
      redis:
        condition: service_healthy
      slm-platform:
        condition: service_healthy
    environment:
      CHECKPOINTER_URL: postgresql://postgres:${AGENTCORE_DB_PASSWORD:-postgres}@postgres-agentcore:5432/agentcore
      REDIS_URL: redis://redis:6379/0
      LLM_MODEL: ${AGENT_LLM_MODEL:-claude-sonnet-4-6}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      REGISTRY_URL: http://registry-service:8001
      REGISTRY_CACHE_TTL_SECONDS: ${REGISTRY_CACHE_TTL_SECONDS:-60}
      REGISTRY_AUTH_URL: http://auth-service:9000
      REGISTRY_USERNAME: ${SEED_USERNAME:-sre-seed@example.com}
      REGISTRY_PASSWORD: ${SEED_PASSWORD:-changeme}
      SLM_PLATFORM_URL: http://slm-platform:8080
      AGENT_ID: ${AGENT_ID:-chat-ai-agent}
      USE_SYNTHETIC_DATA: ${USE_SYNTHETIC_DATA:-true}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      DD_API_KEY: ${DD_API_KEY:-}
      DD_APP_KEY: ${DD_APP_KEY:-}
      DD_SITE: ${DD_SITE:-datadoghq.com}
      PD_API_KEY: ${PD_API_KEY:-}
      PD_ROUTING_KEY: ${PD_ROUTING_KEY:-}
      PD_FROM_EMAIL: ${PD_FROM_EMAIL:-}
      PD_SERVICE_ID: ${PD_SERVICE_ID:-}
    networks:
      - agentic

  # ── AgentGateway ──────────────────────────────────────────────────────────────
  agent-gateway:
    build:
      context: ../
      dockerfile: AgentGateway/Dockerfile
    depends_on:
      postgres-gateway:
        condition: service_healthy
      auth-service:
        condition: service_started
      agentbe:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${GATEWAY_DB_PASSWORD:-postgres}@postgres-gateway:5432/agent_gateway
      JWKS_URL: http://auth-service:9000/.well-known/jwks.json
      AUTH_SERVICE_TOKEN_URL: http://auth-service:9000/auth/token
      AGENT_BE_URL: http://agentbe:8001
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost,http://localhost:3001,${EXTRA_CORS_ORIGINS:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      REGISTRY_URL: http://registry-service:8001
    networks:
      - agentic

  # ── Mock API — simulates tool endpoints (VPN, Datadog, PagerDuty) ────────────
  mock-api:
    build:
      context: ../SREDemo/mock_api
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentic

  # ── Domain seeder — registers VPN schema, tool contracts, playbook ────────────
  connectivity-seeder:
    build:
      context: ../RegistryService
    entrypoint: ["python"]
    command: ["scripts/seed_connectivity.py"]
    depends_on:
      registry-service:
        condition: service_healthy
      auth-service:
        condition: service_started
      mock-api:
        condition: service_healthy
    environment:
      REGISTRY_SERVICE_URL: http://registry-service:8001
      AUTH_SERVICE_URL: http://auth-service:9000
      SEED_USERNAME: ${SEED_USERNAME:-sre-seed@example.com}
      SEED_PASSWORD: ${SEED_PASSWORD:-changeme}
      MOCK_API_URL: http://mock-api:8080
    restart: "no"
    networks:
      - agentic

  # ── ChatAIAgent Web UI — nginx (static files + /gateway proxy) ───────────────
  chat-ai-agent:
    build:
      context: ../
      dockerfile: ChatAIAgent/Dockerfile
    depends_on:
      - agent-gateway
      - connectivity-seeder
      - slm-platform
    environment:
      AGENT_GATEWAY_URL: http://agent-gateway:8000
      SLM_PLATFORM_URL: http://slm-platform:8080
      REGISTRY_SERVICE_URL: http://registry-service:8001
    ports:
      - "3001:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - agentic

networks:
  agentic:
    driver: bridge

volumes:
  postgres_auth_data:
  postgres_registry_data:
  postgres_gateway_data:
  postgres_agentcore_data:
  postgres_slm_data:
  rsa_keys:

secrets:
  github_token:
    environment: GITHUB_TOKEN
