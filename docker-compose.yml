services:

  # ── Auth Service DB ──────────────────────────────────────────────────────────
  postgres-auth:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: auth_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:-postgres}
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_service"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - agentic

  # ── Auth Service ─────────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ../AuthService
    depends_on:
      postgres-auth:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${AUTH_DB_PASSWORD:-postgres}@postgres-auth:5432/auth_service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      RSA_KEY_ID: ${RSA_KEY_ID:-key-2024-01}
      RSA_KEY_DIR: /keys
      TOKEN_EXPIRE_MINUTES: ${TOKEN_EXPIRE_MINUTES:-60}
    ports:
      - "9000:9000"
    volumes:
      - rsa_keys:/keys
    networks:
      - agentic

  # ── Registry Service DB ───────────────────────────────────────────────────────
  postgres-registry:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: registry_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${REGISTRY_DB_PASSWORD:-postgres}
    volumes:
      - postgres_registry_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d registry_service"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - agentic

  # ── Registry Service ──────────────────────────────────────────────────────────
  registry-service:
    build:
      context: ../RegistryService
    depends_on:
      postgres-registry:
        condition: service_healthy
      auth-service:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${REGISTRY_DB_PASSWORD:-postgres}@postgres-registry:5432/registry_service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      JWKS_URL: http://auth-service:9000/.well-known/jwks.json
      AUTH_SERVICE_TOKEN_URL: http://auth-service:9000/auth/token
      REGISTRY_SERVICE_URL: http://registry-service:8001
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEFAULT_TENANT: ${DEFAULT_TENANT:-demo}
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s
    networks:
      - agentic

  # ── AgentCore DB (LangGraph checkpoints, plan history) ───────────────────────
  postgres-agentcore:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agentcore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${AGENTCORE_DB_PASSWORD:-postgres}
    volumes:
      - postgres_agentcore_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agentcore"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - agentic

  # ── SLMPlatform DB (agent run metrics) ───────────────────────────────────────
  postgres-slm:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: slm_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${SLM_DB_PASSWORD:-postgres}
    volumes:
      - postgres_slm_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d slm_platform"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - agentic

  # ── SLMPlatform (agent perf metrics API) ─────────────────────────────────────
  slm-platform:
    build:
      context: ../SLMPlatform
    depends_on:
      postgres-slm:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${SLM_DB_PASSWORD:-postgres}@postgres-slm:5432/slm_platform
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      SLMPLATFORM_API_TOKEN: ${SLMPLATFORM_API_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CORS_ALLOW_ORIGINS: "http://localhost:3001,http://localhost:8001,http://127.0.0.1:3001,http://127.0.0.1:8001,http://localhost:5173"
    ports:
      - "8002:8080"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - agentic

  # ── Jaeger (distributed tracing UI + OTLP collector) ─────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
    networks:
      - agentic

  # ── Redis (streaming event bus) ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - agentic

  # ── SRE Agent (LangGraph runtime, replaces AgentBE) ──────────────────────────
  sre-agent:
    build:
      context: ../
      dockerfile: ChatAIAgent/agent/Dockerfile
    depends_on:
      postgres-agentcore:
        condition: service_healthy
      registry-service:
        condition: service_healthy
      redis:
        condition: service_healthy
      slm-platform:
        condition: service_healthy
    environment:
      CHECKPOINTER_URL: postgresql://postgres:${AGENTCORE_DB_PASSWORD:-postgres}@postgres-agentcore:5432/agentcore
      REDIS_URL: redis://redis:6379/0
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      LLM_MODEL: ${AGENT_LLM_MODEL:-claude-sonnet-4-6}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      REGISTRY_SERVICE_URL: http://registry-service:8001
      REGISTRY_CACHE_TTL_SECONDS: ${REGISTRY_CACHE_TTL_SECONDS:-60}
      REGISTRY_AUTH_URL: http://auth-service:9000
      REGISTRY_USERNAME: ${SEED_USERNAME:-sre-seed@example.com}
      REGISTRY_PASSWORD: ${SEED_PASSWORD:-changeme}
      SLM_PLATFORM_URL: http://slm-platform:8080
      AGENT_ID: ${AGENT_ID:-sre-agent}
      USE_SYNTHETIC_DATA: ${USE_SYNTHETIC_DATA:-true}
      PORT: 8080
      CONTEXT_MAX_TOKENS: ${CONTEXT_MAX_TOKENS:-8000}
      OPA_URL: ${OPA_URL:-http://opa:8181}
      POLICY_SERVICE_URL: ${POLICY_SERVICE_URL:-http://policy-service:8090}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      DD_API_KEY: ${DD_API_KEY:-}
      DD_APP_KEY: ${DD_APP_KEY:-}
      DD_SITE: ${DD_SITE:-datadoghq.com}
      PD_API_KEY: ${PD_API_KEY:-}
      PD_ROUTING_KEY: ${PD_ROUTING_KEY:-}
      PD_FROM_EMAIL: ${PD_FROM_EMAIL:-}
      PD_SERVICE_ID: ${PD_SERVICE_ID:-}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    networks:
      - agentic

  # ── PolicyService — session + safety validator (shared microservice) ─────────
  policy-service:
    build:
      context: ../PolicyService
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GUARDRAILS_API_KEY: ${GUARDRAILS_API_KEY:-}
      SAFETY_TIMEOUT_S: ${SAFETY_TIMEOUT_S:-2}
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - agentic

  # ── OPA — Policy Decision Point (ext_authz gRPC for Envoy) ──────────────────
  # amd64-only image; runs under Rosetta on Apple Silicon.
  # No healthcheck: the image has no shell or wget (distroless). OPA starts
  # in <1s so Envoy's restart: on-failure handles the rare startup race.
  opa:
    platform: linux/amd64
    build:
      context: ../AgentSidecar/opa
      dockerfile: Dockerfile
    command:
      - run
      - --server
      - --config-file=/config.yaml
      - --addr=0.0.0.0:8181
      - --log-level=info
      - /rego
      - /data
    environment:
      POLICY_SERVICE_URL: http://policy-service:8090
    depends_on:
      policy-service:
        condition: service_healthy
    restart: on-failure
    networks:
      - agentic

  # ── ratelimit — Envoy global rate limit backend (Redis-backed, per-user quotas) ─
  ratelimit:
    image: envoyproxy/ratelimit:master
    environment:
      LOG_LEVEL: warn
      REDIS_SOCKET_TYPE: tcp
      REDIS_URL: redis:6379
      USE_STATSD: "false"
      RUNTIME_ROOT: /data
      RUNTIME_SUBDIRECTORY: ratelimit
      RUNTIME_WATCH_ROOT: "false"
      RUNTIME_IGNOREDOTFILES: "true"
    volumes:
      - ../AgentSidecar/ratelimit:/data/ratelimit/config:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - agentic

  # ── Envoy — sidecar proxy (JWT authn + rate limiting + OPA ext_authz) ─────────
  envoy:
    image: envoyproxy/envoy:v1.31-latest
    volumes:
      - ../AgentSidecar/envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
    command: ["/usr/local/bin/envoy", "-c", "/etc/envoy/envoy.yaml", "--log-level", "info"]
    ports:
      - "10000:10000"
    depends_on:
      auth-service:
        condition: service_started
      opa:
        condition: service_started
      ratelimit:
        condition: service_started
      policy-service:
        condition: service_healthy
      sre-agent:
        condition: service_healthy
    restart: on-failure
    networks:
      - agentic

  # ── Mock API — simulates tool endpoints (VPN, Datadog, PagerDuty) ────────────
  mock-api:
    build:
      context: ./mock_api
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentic

  # ── Domain seeder — registers VPN schema, tool contracts, playbook ────────────
  connectivity-seeder:
    build:
      context: ../RegistryService
    entrypoint: ["python"]
    command: ["scripts/seed_connectivity.py"]
    depends_on:
      registry-service:
        condition: service_healthy
      auth-service:
        condition: service_started
      mock-api:
        condition: service_healthy
    environment:
      REGISTRY_SERVICE_URL: http://registry-service:8001
      AUTH_SERVICE_URL: http://auth-service:9000
      SEED_USERNAME: ${SEED_USERNAME:-sre-seed@example.com}
      SEED_PASSWORD: ${SEED_PASSWORD:-changeme}
      MOCK_API_URL: http://mock-api:8080
    restart: "no"
    networks:
      - agentic

  # ── KB seeder — loads Cradlepoint KB articles into migration_chunks for RAG ──
  kb-seeder:
    build:
      context: ../RegistryService
    entrypoint: ["python"]
    command: ["scripts/seed_kb.py"]
    depends_on:
      connectivity-seeder:
        condition: service_completed_successfully
    environment:
      REGISTRY_SERVICE_URL: http://registry-service:8001
      AUTH_SERVICE_URL: http://auth-service:9000
      SEED_USERNAME: ${SEED_USERNAME:-sre-seed@example.com}
      SEED_PASSWORD: ${SEED_PASSWORD:-changeme}
      KB_DIR: /kb
    volumes:
      - ../Simulation/cradlepoint/kb:/kb:ro
    restart: "no"
    networks:
      - agentic

  # ── ChatAIAgent Web UI — nginx (static files + /gateway proxy) ───────────────
  chat-ai-agent:
    build:
      context: ../
      dockerfile: ChatAIAgent/Dockerfile
    depends_on:
      - envoy
      - kb-seeder
      - slm-platform
    environment:
      ENVOY_URL: http://envoy:10000
      AUTH_SERVICE_URL: http://auth-service:9000
      SLM_PLATFORM_URL: http://slm-platform:8080
      REGISTRY_SERVICE_URL: http://registry-service:8001
    ports:
      - "3001:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - agentic

networks:
  agentic:
    driver: bridge

volumes:
  postgres_auth_data:
  postgres_registry_data:
  postgres_agentcore_data:
  postgres_slm_data:
  rsa_keys:

secrets:
  github_token:
    environment: GITHUB_TOKEN
